<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>심재윤 웹명함</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f3f6fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      color: #1f2937;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 390px;
      background: #ffffff;
      border-radius: 28px;
      padding: 34px 28px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
      border: 1px solid #edf0f5;
      text-align: center;
    }

    .profile-image-wrap {
      width: 128px;
      height: 128px;
      margin: 0 auto 22px;
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(135deg, #e5e7eb, #ffffff);
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.12);
    }

    .profile-image {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: #f1f5f9;
    }

    .name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      color: #111827;
    }

    .job {
      display: inline-block;
      font-size: 14px;
      font-weight: 600;
      color: #2563eb;
      background: #eff6ff;
      padding: 8px 14px;
      border-radius: 999px;
      margin-bottom: 26px;
    }

    .info-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px 16px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid #eef2f7;
      text-decoration: none;
      color: #334155;
      transition: 0.25s ease;
    }

    .info-item:hover {
      background: #f1f5f9;
      transform: translateY(-2px);
    }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
      flex-shrink: 0;
    }

    .info-text {
      text-align: left;
    }

    .label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 3px;
    }

    .value {
      font-size: 15px;
      font-weight: 600;
      color: #1e293b;
      word-break: break-all;
    }

    .button-area {
      display: flex;
      gap: 10px;
    }

    .button {
      flex: 1;
      padding: 14px 12px;
      border-radius: 15px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      transition: 0.25s ease;
    }

    .primary {
      background: #2563eb;
      color: #ffffff;
    }

    .secondary {
      background: #f1f5f9;
      color: #334155;
    }

    .button:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #cbd5e1;
    }

    @media (max-width: 420px) {
      .card {
        padding: 30px 22px;
      }

      .name {
        font-size: 25px;
      }

      .button-area {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="profile-image-wrap">
      <!-- profile.jpg 파일을 index.html과 같은 폴더에 넣으면 됩니다 -->
      <img
        class="profile-image"
        src="profile.jpg"
        alt="프로필 이미지"
        onerror="this.src='https://via.placeholder.com/300x300/f1f5f9/94a3b8?text=PROFILE';"
      />
    </div>

    <!-- 이름 -->
    <h1 class="name">심재윤</h1>

    <!-- 직군 -->
    <p class="job">Game Business PM · Service Operations</p>

    <section class="info-list">
      <!-- 이메일 -->
      <a class="info-item" href="mailto:example@email.com">
        <div class="icon">✉️</div>
        <div class="info-text">
          <div class="label">Email</div>
          <div class="value">example@email.com</div>
        </div>
      </a>

      <!-- 전화번호 -->
      <a class="info-item" href="tel:01012345678">
        <div class="icon">📞</div>
        <div class="info-text">
          <div class="label">Phone</div>
          <div class="value">010-1234-5678</div>
        </div>
      </a>
    </section>

    <div class="button-area">
      <a class="button primary" href="mailto:example@email.com">
        이메일 보내기
      </a>

      <a class="button secondary" href="tel:01012345678">
        전화하기
      </a>
    </div>

    <p class="footer">Digital Business Card</p>
  </main>
</body>
</html>
